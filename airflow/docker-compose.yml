version: '3'

services:

  postgres:
    image: postgres:13
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5433:5432"

  airflow-init:
    image: apache/airflow:2.9.2

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "kNguYpyciOuTCC3Nv7VkCg=="

    volumes:
      - ./dags:/opt/airflow/dags
      - "F:/mastercampus/Retail Project/RetailOps_Streaming:/opt/airflow/streaming"

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.2

    depends_on:
      - airflow-init

    restart: always

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "kNguYpyciOuTCC3Nv7VkCg=="

    volumes:
      - ./dags:/opt/airflow/dags
      - "F:/mastercampus/Retail Project/RetailOps_Streaming:/opt/airflow/streaming"

    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.2

    depends_on:
      - airflow-init

    restart: always

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "kNguYpyciOuTCC3Nv7VkCg=="

    volumes:
      - ./dags:/opt/airflow/dags
      - "F:/mastercampus/Retail Project/RetailOps_Streaming:/opt/airflow/streaming"

    command: scheduler